name: Docker Image CI - GHCR

# 触发条件：手动触发 (也可以按需开启 push 到 main 分支时自动触发)
on:
  workflow_dispatch:


env:
  # Registry 名称，使用 GitHub Container Registry
  REGISTRY: ghcr.io
  # 镜像名称，默认为当前仓库的小写连字符名称，如 tsxcw/mtab
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    
    # 授予 GitHub token 以便能够向 ghcr.io 推送 package
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 配置 QEMU 和 Buildx 以支持多架构构建 (如果不开启多平台构建，这步可以省略)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 登录到 ghcr.io
      # 使用触发 workflow 的账号的 GITHUB_TOKEN
      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 提取能够用来打标签的 metadata 
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=${{ github.event.inputs.tag }}

      # 构建并推送到 GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 可选：如果你要构建 linux/amd64 和 linux/arm64 多架构
          platforms: linux/amd64,linux/arm64
